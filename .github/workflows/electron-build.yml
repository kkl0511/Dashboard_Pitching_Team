name: Build Electron Desktop App

on:
  push:
    tags:
      - 'v*'                # v5.40, v5.41 등 태그 push 시 자동 빌드
  workflow_dispatch:        # GitHub UI 에서 수동 실행 가능

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: electron/package-lock.json

      - name: Install dependencies
        working-directory: electron
        run: npm install

      - name: Build dashboard.html (latest src/)
        run: node scripts/build_dashboard.js

      - name: Prepare Electron build assets
        working-directory: electron
        run: node build-prep.js

      - name: Build Windows .exe (NSIS + portable)
        working-directory: electron
        run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Setup.exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-setup
          path: electron/dist/*.exe

      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: electron/dist/*.exe
          name: ${{ github.ref_name }}
          body: |
            # 상동고 투구 리포트 ${{ github.ref_name }}

            ## 다운로드
            - **상동고-투구-리포트-Setup-x.x.x.exe** — 윈도우 NSIS 설치본 (~80 MB)
            - **상동고-투구-리포트-x.x.x.exe** — Portable 버전 (설치 불요)

            설치 가이드: `docs/downloads/INSTALL_GUIDE.md`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
