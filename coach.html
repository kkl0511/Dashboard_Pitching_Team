<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<title>코치용 리포트 — 상동고 투수 대시보드</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
<link href="css/coach.css" rel="stylesheet">
</head>
<body>

<header class="coach-h">
  <div class="brand">코치용 리포트<span class="sub">상동고 투수 대시보드</span></div>
  <a href="dashboard.html" class="nav-link">분석가용 ↗</a>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="team">팀 현황</button>
  <button class="tab-btn" data-tab="player">선수별</button>
  <button class="tab-btn" data-tab="trend">장기 추적</button>
</nav>

<main>
  <!-- ▶ Tab 1: 팀 현황 -->
  <section id="tab-team" class="tab-pane active">
    <div id="team-content">
      <div class="empty-state"><div class="ico">⏳</div><div>분석 모듈 로딩 중…</div></div>
    </div>
  </section>

  <!-- ▶ Tab 2: 선수별 -->
  <section id="tab-player" class="tab-pane">
    <div class="player-select-wrap">
      <select id="player-select" class="player-select" disabled><option>로딩 중…</option></select>
    </div>
    <div id="player-content"></div>
  </section>

  <!-- ▶ Tab 3: 장기 추적 -->
  <section id="tab-trend" class="tab-pane">
    <div class="player-select-wrap">
      <select id="trend-player-select" class="player-select" disabled><option>로딩 중…</option></select>
    </div>
    <div id="trend-content"></div>
  </section>

  <!--
    데이터 입력 없음: 분석가가 dashboard.html 에서 입력 → 같은 도메인 localStorage 자동 공유.
    iframe 으로 dashboard.html 로드 → WIN.PLAYERS / WIN.DATA / WIN.ANALYTICS 사용.
  -->
</main>

<iframe id="data-iframe" aria-hidden="true"></iframe>
<script>document.getElementById('data-iframe').src = 'dashboard.html?embed=coach&_=' + Date.now();</script>

<!-- 모듈 로드 순서: helpers → 데이터 → 차트 → 섹션 → 탭 → app -->
<script src="js/coach/helpers.js"></script>
<script src="js/coach/variable-info.js"></script>
<script src="js/coach/sequence-chart.js"></script>
<script src="js/coach/posture-mannequin.js"></script>
<script src="js/coach/fitness-radar.js"></script>
<script src="js/coach/rapsodo-cards.js"></script>
<script src="js/coach/player-detail.js"></script>
<script src="js/coach/team-overview.js"></script>
<script src="js/coach/long-term-trend.js"></script>
<script src="js/coach/app.js"></script>

</body>
</html>
