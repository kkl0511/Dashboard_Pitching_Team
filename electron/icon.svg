<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect x="0" y="0" width="256" height="256" rx="44" ry="44" fill="url(#bgGrad)" stroke="#cbd5e1" stroke-width="1"/>

  <!-- ─── 모션캡쳐 batter (상단) — 작게 + 안전한 viewBox 안 ─── -->
  <g transform="translate(95, 28) scale(0.78)" fill="#2563EB">
    <!-- 헬멧 + 머리 -->
    <ellipse cx="40" cy="10" rx="10" ry="11"/>
    <path d="M 30 6 Q 28 0, 34 -2 Q 40 -3, 46 -2 Q 50 0, 50 6 Z"/>
    <!-- 상체 (오른쪽으로 회전) -->
    <path d="M 28 22 C 26 30, 26 40, 28 50 L 30 60 C 32 64, 42 66, 50 64 L 60 60 C 66 56, 66 48, 64 40 L 60 28 C 56 22, 50 20, 44 20 Z"/>
    <!-- 앞팔 + 배트 (오른쪽으로 길게) -->
    <path d="M 60 30 C 66 26, 78 22, 88 18 L 100 12 L 102 18 L 92 22 L 80 26 L 70 30 Z"/>
    <rect x="100" y="8" width="44" height="6" rx="2"/>
    <ellipse cx="140" cy="11" rx="3.5" ry="4"/>
    <!-- 뒷팔 -->
    <path d="M 26 26 C 22 24, 16 20, 12 18 L 8 16 C 6 15, 4 16, 4 18 L 6 22 L 14 26 L 22 30 Z"/>
    <!-- 앞다리 (좌하 굽힘) -->
    <path d="M 30 60 C 28 66, 24 76, 20 84 L 14 92 C 12 96, 10 100, 8 102 L 4 108 L 8 110 L 14 102 L 20 92 L 26 80 L 30 70 Z"/>
    <!-- 뒷다리 (우하 펴짐) -->
    <path d="M 56 60 C 58 68, 62 76, 66 82 L 72 92 C 74 96, 76 98, 78 100 L 82 104 L 84 100 L 78 94 L 72 86 L 66 78 L 60 70 Z"/>
    <!-- 발 -->
    <ellipse cx="6" cy="110" rx="7" ry="2.5"/>
    <ellipse cx="84" cy="103" rx="7" ry="2.5"/>
    <!-- 키포인트 (흰색 노드) -->
    <g fill="#ffffff" stroke="#2563EB" stroke-width="1">
      <circle cx="40" cy="16" r="2.5"/>
      <circle cx="32" cy="26" r="2.5"/>
      <circle cx="56" cy="28" r="2.5"/>
      <circle cx="88" cy="18" r="2.5"/>
      <circle cx="14" cy="22" r="2.5"/>
      <circle cx="42" cy="50" r="2.5"/>
      <circle cx="22" cy="74" r="2.5"/>
      <circle cx="62" cy="76" r="2.5"/>
      <circle cx="10" cy="100" r="2.5"/>
      <circle cx="78" cy="98" r="2.5"/>
    </g>
    <!-- 키포인트 연결선 -->
    <g stroke="#ffffff" stroke-width="1.4" fill="none" opacity="0.9">
      <line x1="40" y1="16" x2="42" y2="50"/>
      <line x1="32" y1="26" x2="14" y2="22"/>
      <line x1="56" y1="28" x2="88" y2="18"/>
      <line x1="42" y1="50" x2="22" y2="74"/>
      <line x1="42" y1="50" x2="62" y2="76"/>
      <line x1="22" y1="74" x2="10" y2="100"/>
      <line x1="62" y1="76" x2="78" y2="98"/>
    </g>
  </g>

  <!-- ─── BBL 메인 텍스트 (B 파랑, B 검정, L 파랑) ─── -->
  <g font-family="Arial Black, sans-serif" font-weight="900" font-size="84" letter-spacing="-2">
    <text x="48" y="200" fill="#2563EB">B</text>
    <text x="100" y="200" fill="#1f2328">B</text>
    <text x="155" y="200" fill="#2563EB">L</text>
  </g>

  <!-- ─── 부제 ─── -->
  <text x="128" y="226" font-family="Arial, sans-serif" font-weight="600"
        font-size="9" letter-spacing="1.4" text-anchor="middle" fill="#1f2328">
    BIOMOTION BASEBALL LAB
  </text>
</svg>
